<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>수세미 판매 관리</title>
<style>
:root{--bk:#111;--wh:#fff;--g1:#f5f5f5;--g2:#e5e5e5;--g3:#999;--g4:#555;--gin:#2a7a4a;--gex:#b53030;--sb:env(safe-area-inset-bottom,0px);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,'Malgun Gothic',sans-serif;background:var(--g1);color:var(--bk);font-size:14px;}

.app{display:flex;flex-direction:column;height:100dvh;height:100vh;}

/* HEADER */
.hdr{background:var(--bk);color:#fff;padding:0 16px;height:50px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hdr-logo{font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px;}
.logo-sq{width:11px;height:11px;background:#fff;flex-shrink:0;}
.hdr-add{width:36px;height:36px;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:22px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}

/* STATS */
.stats{background:var(--wh);border-bottom:1px solid var(--g2);display:flex;overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
.stats::-webkit-scrollbar{display:none;}
.stat{padding:10px 15px;border-right:1px solid var(--g2);flex-shrink:0;}
.stat:last-child{border-right:none;}
.stat .sl{font-size:10px;color:var(--g3);margin-bottom:2px;white-space:nowrap;}
.stat .sv{font-size:15px;font-weight:700;white-space:nowrap;}
.sv.gin{color:var(--gin)}.sv.gex{color:var(--gex);}

/* FILTER BAR */
.chips{display:flex;gap:6px;padding:10px 14px;overflow-x:auto;background:var(--wh);border-bottom:1px solid var(--g2);flex-shrink:0;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{padding:6px 13px;border-radius:20px;border:1px solid var(--g2);background:var(--wh);font-size:12px;cursor:pointer;white-space:nowrap;font-family:inherit;flex-shrink:0;}
.chip.active{background:var(--bk);color:var(--wh);border-color:var(--bk);}

/* CONTENT */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* BOTTOM NAV */
.bnav{background:var(--wh);border-top:1px solid var(--g2);display:flex;padding-top:8px;padding-bottom:calc(var(--sb) + 8px);flex-shrink:0;}
.bn{flex:1;height:54px;border:none;background:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:10px;color:var(--g3);cursor:pointer;font-family:inherit;}
.bn .ico{font-size:22px;line-height:1;}
.bn.active{color:var(--bk);font-weight:600;}
.bn-dot{width:4px;height:4px;border-radius:50%;background:transparent;margin-top:1px;}
.bn.active .bn-dot{background:var(--bk);}

/* SECTION LABELS */
.sec-lbl{padding:12px 14px 5px;font-size:11px;font-weight:700;color:var(--g3);letter-spacing:.06em;text-transform:uppercase;background:var(--g1);}

/* TRANSACTION ROWS */
.tx-row{background:var(--wh);border-bottom:1px solid var(--g2);padding:13px 14px;display:flex;align-items:center;gap:10px;min-height:58px;cursor:pointer;}
.tx-row.active-row{background:#f0f0f0;}
.tx-left{flex:1;min-width:0;}
.tx-meta{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.tx-date{font-size:11px;color:var(--g3);}
.txb{font-size:10px;padding:1px 6px;border:1px solid var(--g2);color:var(--g4);white-space:nowrap;}
.tx-name{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tx-note{font-size:11px;color:var(--g3);margin-top:2px;}
.tx-amt{font-size:16px;font-weight:700;text-align:right;white-space:nowrap;}
.ain{color:var(--gin)}.aex{color:var(--gex);}

/* ROW ACTION BAR */
.row-acts{display:none;background:#ececec;border-bottom:1px solid var(--g2);padding:8px 14px;gap:8px;}
.row-acts.open{display:flex;}
.ra{flex:1;padding:9px;border:1px solid var(--g2);background:var(--wh);font-size:13px;cursor:pointer;font-family:inherit;border-radius:7px;font-weight:600;}
.ra.del{color:var(--gex);border-color:rgba(181,48,48,.3);}

/* MONTH SUMMARY */
.m-sum{background:#fafafa;border-bottom:1px solid var(--g2);padding:11px 14px;border-left:3px solid var(--g2);}
.ms-title{font-size:11px;font-weight:700;color:var(--g4);margin-bottom:7px;}
.ms-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;color:var(--g4);}
.ms-row span:last-child{font-weight:700;}
.ms-row.cum{border-top:1px dashed var(--g2);padding-top:5px;margin-top:2px;font-size:11px;}

/* MATERIAL ROWS */
.mat-row{background:var(--wh);border-bottom:1px solid var(--g2);padding:12px 14px;display:flex;align-items:center;gap:12px;min-height:58px;cursor:pointer;}
.mat-row.active-row{background:#f0f0f0;}
.mat-swatch{width:38px;height:38px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,.1);}
.mat-icon{width:38px;height:38px;background:var(--g1);border:1px solid var(--g2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;border-radius:9px;}
.mat-info{flex:1;min-width:0;}
.mat-name{font-size:14px;font-weight:600;}
.mat-sub{font-size:11px;color:var(--g3);margin-top:2px;}
.mat-chev{color:var(--g3);font-size:16px;flex-shrink:0;}

/* PRODUCT ROWS */
.prod-row{background:var(--wh);border-bottom:1px solid var(--g2);padding:14px;cursor:pointer;}
.prod-row.active-row{background:#f0f0f0;}
.pr-hd{display:flex;align-items:center;gap:7px;margin-bottom:7px;}
.pr-name{font-size:15px;font-weight:700;flex:1;}
.pr-st{font-size:10px;padding:2px 7px;border:1px solid var(--g2);color:var(--g4);}
.pr-st.sa{border-color:var(--gin);color:var(--gin);}
.pr-st.sp{border-color:#9a6000;color:#9a6000;}
.pr-st.sd{color:var(--g3);}
.pr-date{font-size:11px;color:var(--g3);}
.pr-desc{font-size:12px;color:var(--g4);margin-bottom:8px;line-height:1.5;}
.pr-tags{display:flex;flex-wrap:wrap;gap:4px;}
.pr-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 8px;border:1px solid var(--g2);color:var(--g4);border-radius:4px;}
.pr-dot{width:8px;height:8px;border-radius:50%;}
.pr-thumb{width:54px;height:54px;object-fit:cover;border-radius:8px;flex-shrink:0;border:1px solid var(--g2);}
.pr-photo{width:100%;max-height:260px;object-fit:cover;border-radius:8px;display:block;margin-bottom:10px;}
.photo-upload{border:2px dashed var(--g2);border-radius:9px;padding:18px 12px;text-align:center;cursor:pointer;position:relative;transition:border-color .15s;}
.photo-upload:hover{border-color:var(--g4);}
.photo-upload input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.photo-upload-ico{font-size:26px;margin-bottom:4px;}
.photo-upload-txt{font-size:12px;color:var(--g3);}
.photo-preview-wrap{position:relative;margin-top:0;}
.photo-preview-wrap img{width:100%;max-height:220px;object-fit:cover;border-radius:9px;display:block;}
.photo-remove-btn{position:absolute;top:7px;right:7px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:28px;height:28px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--g2);margin-bottom:1px;}
.dg-cell{background:var(--wh);padding:15px 14px;}
.dg-lbl{font-size:11px;color:var(--g3);margin-bottom:4px;}
.dg-val{font-size:20px;font-weight:700;}
.chart-sec{background:var(--wh);padding:14px;border-bottom:1px solid var(--g2);}
.sec-title{font-size:11px;font-weight:700;color:var(--g3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:11px;}
.chart-wrap{height:190px;position:relative;}
.rec-sec{background:var(--wh);padding:14px;}
.rec-row{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--g2);gap:8px;}
.rec-row:last-child{border-bottom:none;}
.rec-date{font-size:11px;color:var(--g3);white-space:nowrap;}
.rec-name{flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rec-amt{font-size:13px;font-weight:700;white-space:nowrap;}

/* BOTTOM SHEET */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;}
.overlay.open{display:block;}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--wh);border-radius:18px 18px 0 0;max-height:92dvh;max-height:92vh;display:flex;flex-direction:column;z-index:201;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);padding-bottom:var(--sb);}
.sheet.open{transform:translateY(0);}
.sheet-handle{width:36px;height:4px;background:var(--g2);border-radius:2px;margin:10px auto 0;flex-shrink:0;}
.sheet-hd{padding:12px 16px;border-bottom:1px solid var(--g2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.sheet-title{font-size:16px;font-weight:700;}
.sheet-x{width:30px;height:30px;border:none;background:var(--g1);border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--g4);}
.sheet-body{padding:16px;overflow-y:auto;flex:1;}

/* FORM */
.fg{margin-bottom:14px;}
.fl{font-size:11px;font-weight:600;color:var(--g3);letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px;display:block;}
.fi{width:100%;padding:12px;border:1px solid var(--g2);font-size:15px;outline:none;font-family:inherit;background:var(--wh);border-radius:9px;transition:border-color .15s;}
.fi:focus{border-color:var(--bk);}
select.fi{appearance:none;}
textarea.fi{resize:none;min-height:70px;font-size:14px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fbtn{width:100%;padding:15px;border:none;font-size:15px;font-weight:700;font-family:inherit;border-radius:10px;cursor:pointer;margin-bottom:8px;}
.fb-p{background:var(--bk);color:var(--wh);}
.fb-s{background:var(--g1);color:var(--bk);}
.fb-d{background:var(--gex);color:var(--wh);}
.chk-list{border:1px solid var(--g2);border-radius:9px;overflow:hidden;max-height:210px;overflow-y:auto;}
.chk-item{display:flex;align-items:center;gap:10px;padding:12px;border-bottom:1px solid var(--g2);cursor:pointer;}
.chk-item:last-child{border-bottom:none;}
.chk-item input{width:18px;height:18px;flex-shrink:0;cursor:pointer;accent-color:var(--bk);}
.chk-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
.chk-sq{font-size:14px;width:20px;text-align:center;flex-shrink:0;}
.chk-txt{font-size:13px;}
input[type=color].fi{padding:4px;height:46px;}
.div-line{height:1px;background:var(--g2);margin:10px 0;}

.toast{position:fixed;bottom:calc(60px + var(--sb) + 12px);left:50%;transform:translateX(-50%) translateY(80px);background:var(--bk);color:var(--wh);padding:10px 20px;font-size:13px;border-radius:22px;z-index:500;transition:transform .25s;white-space:nowrap;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.empty{text-align:center;padding:60px 20px;font-size:13px;color:var(--g3);}

/* SEARCH */
.search-bar{background:var(--wh);padding:8px 12px;border-bottom:1px solid var(--g2);flex-shrink:0;display:none;}
.search-bar.open{display:block;}
.search-input-wrap{position:relative;display:flex;align-items:center;}
.search-input-wrap .fi{padding-left:34px;margin:0;font-size:14px;}
.search-icon{position:absolute;left:11px;font-size:15px;color:var(--g3);pointer-events:none;}
.search-clear{position:absolute;right:11px;background:none;border:none;color:var(--g3);font-size:16px;cursor:pointer;padding:4px;}
.srch-lbl{font-size:10px;font-weight:700;color:var(--g3);letter-spacing:.06em;text-transform:uppercase;padding:10px 14px 4px;background:var(--g1);}
.srch-none{text-align:center;padding:40px 20px;font-size:13px;color:var(--g3);}

/* SALES COUNT */
.pr-sales{display:flex;align-items:center;gap:5px;margin-top:5px;}
.pr-sales-lbl{font-size:11px;color:var(--g3);}
.pr-sales-num{font-size:13px;font-weight:700;color:var(--bk);}
.ra-cnt{display:flex;align-items:center;gap:10px;flex:2;justify-content:center;border:1px solid var(--g2);border-radius:7px;background:var(--wh);padding:6px 10px;}
.cnt-btn{width:30px;height:30px;border:none;background:var(--g1);font-size:18px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;}
.cnt-num{font-size:15px;font-weight:700;min-width:28px;text-align:center;}

/* COUPANG SETTLEMENT */
.cs-calc{background:var(--g1);border-radius:9px;padding:12px;margin-top:8px;font-size:12px;}
.cs-row{display:flex;justify-content:space-between;padding:3px 0;color:var(--g4);}
.cs-row.total{border-top:1px solid var(--g2);margin-top:4px;padding-top:7px;font-weight:700;font-size:13px;color:var(--gin);}

/* YARN DISPLAY TOGGLE */
#yarn-extra-fields{display:block;}
#spec-extra-field{display:none;}
#coupang-fields{display:none;}

/* COUPANG DAILY */
.cp-row{background:var(--wh);border-bottom:1px solid var(--g2);padding:13px 14px;display:flex;align-items:center;gap:10px;min-height:58px;cursor:pointer;}
.cp-row.active-row{background:#f0f0f0;}
.cp-left{flex:1;min-width:0;}
.cp-meta{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.cp-date{font-size:11px;color:var(--g3);}
.cp-note{font-size:11px;color:var(--g3);margin-top:2px;}
.cp-qty{font-size:11px;color:var(--g4);}
.cp-amt{font-size:16px;font-weight:700;text-align:right;white-space:nowrap;color:var(--gin);}
.cp-summary{background:#f0faf5;border-bottom:3px solid var(--gin);padding:14px;border-left:3px solid var(--gin);}
.cps-title{font-size:11px;font-weight:700;color:var(--g4);margin-bottom:8px;}
.cps-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;}
.cps-row.total{border-top:1px solid rgba(42,122,74,.2);padding-top:7px;margin-top:4px;font-weight:700;font-size:15px;color:var(--gin);}
.cp-dash-card{background:#f0faf5;border:1px solid rgba(42,122,74,.2);border-radius:10px;padding:14px;margin:10px 14px;}
.cdc-title{font-size:11px;font-weight:700;color:var(--g3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;}
.cdc-main{display:flex;align-items:baseline;gap:6px;margin-bottom:6px;}
.cdc-val{font-size:24px;font-weight:700;color:var(--gin);}
.cdc-unit{font-size:12px;color:var(--g3);}
.cdc-sub{font-size:11px;color:var(--g4);}
.cdc-list{margin-top:10px;border-top:1px solid rgba(42,122,74,.15);padding-top:8px;}
.cdc-item{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;color:var(--g4);}
.cdc-item span:last-child{font-weight:600;color:var(--gin);}

/* INBOUND */
.inb-row{background:var(--wh);border-bottom:1px solid var(--g2);padding:13px 14px;display:flex;align-items:flex-start;gap:10px;min-height:62px;cursor:pointer;}
.inb-row.active-row{background:#f0f0f0;}
.inb-left{flex:1;min-width:0;}
.inb-top{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.inb-name{font-size:15px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.inb-badge{font-size:10px;padding:2px 8px;border-radius:10px;white-space:nowrap;font-weight:600;flex-shrink:0;}
.inb-badge.s0{background:#e8f0fe;color:#1a56db;}
.inb-badge.s1{background:#fff3cd;color:#92600a;}
.inb-badge.s2{background:#d4edda;color:#155724;}
.inb-meta{display:flex;gap:10px;font-size:12px;color:var(--g3);flex-wrap:wrap;}
.inb-meta span{display:flex;align-items:center;gap:3px;}
.inb-qty{font-size:16px;font-weight:700;white-space:nowrap;flex-shrink:0;}
.inb-acts{display:none;background:#ececec;border-bottom:1px solid var(--g2);padding:8px 14px;gap:6px;flex-wrap:wrap;}
.inb-acts.open{display:flex;}
.inb-st-btns{display:flex;gap:5px;width:100%;}
.inb-st-btn{flex:1;padding:8px 4px;border:1px solid var(--g2);background:var(--wh);font-size:11px;font-weight:600;font-family:inherit;border-radius:7px;cursor:pointer;}
.inb-st-btn.cur{background:var(--bk);color:var(--wh);border-color:var(--bk);}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-logo"><span class="logo-sq"></span>수세미 판매 관리</div>
    <div style="display:flex;gap:6px;align-items:center">
      <button class="hdr-add" onclick="toggleSearch()" id="hdr-search" title="검색" style="font-size:17px">🔍</button>
      <button class="hdr-add" id="hdr-csv" onclick="exportCSV()" title="CSV 내보내기" style="display:none;font-size:14px;font-weight:700">↓CSV</button>
      <button class="hdr-add" id="hdr-add" onclick="onAddBtn()" style="display:none">+</button>
    </div>
  </div>
  <div id="search-bar" class="search-bar">
    <div class="search-input-wrap">
      <span class="search-icon">🔍</span>
      <input id="search-input" class="fi" type="search" placeholder="입출금·재료·제품 검색..." oninput="onSearch(this.value)" autocomplete="off">
      <button class="search-clear" onclick="clearSearch()">✕</button>
    </div>
  </div>
  <div id="stats-bar" class="stats"></div>
  <div id="filter-bar"></div>
  <div class="content" id="content"></div>
  <nav class="bnav">
    <button class="bn active" onclick="goPage('dashboard',this)"><span class="ico">📊</span><span>대시보드</span><span class="bn-dot"></span></button>
    <button class="bn" onclick="goPage('coupang',this)"><span class="ico">🛒</span><span>쿠팡판매</span><span class="bn-dot"></span></button>
    <button class="bn" onclick="goPage('transactions',this)"><span class="ico">📒</span><span>입출금</span><span class="bn-dot"></span></button>
    <button class="bn" onclick="goPage('materials',this)"><span class="ico">📦</span><span>재료</span><span class="bn-dot"></span></button>
    <button class="bn" onclick="goPage('products',this)"><span class="ico">🧽</span><span>제품</span><span class="bn-dot"></span></button>
    <button class="bn" onclick="goPage('inbound',this)"><span class="ico">🚛</span><span>입고</span><span class="bn-dot"></span></button>
  </nav>
</div>

<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-hd">
    <span class="sheet-title" id="sheet-title">추가</span>
    <button class="sheet-x" onclick="closeSheet()">✕</button>
  </div>
  <div class="sheet-body" id="sheet-body"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
// ══════════════════════════════════════════

// ══════════════════════════════════════════

  {id:5, date:'2026-02-02',cat:'재료비',item:'실',           up:null,  qty:null, amt:-22850,note:''},
  {id:6, date:'2026-02-03',cat:'입금',  item:'',             up:null,  qty:null, amt:252,   note:''},

// 이미지 리사이즈 (최대 800px, JPEG 0.78 품질)
function resizeImage(file,cb){
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=800;
      let w=img.width,h=img.height;
      if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
      const cv=document.createElement('canvas');
      cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      cb(cv.toDataURL('image/jpeg',0.78));
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

const W=n=>Number(n).toLocaleString('ko-KR')+'원';
const WA=n=>(n>=0?'+':'')+Number(n).toLocaleString('ko-KR')+'원';
const ym=d=>d?d.slice(0,7):'';
const ymL=m=>{const[y,mo]=m.split('-');return `${y}.${parseInt(mo)}월`;};
function getMonths(){return[...new Set(TX.map(t=>ym(t.date)))].sort();}
function calcM(m){
  const rows=m==='all'?TX:TX.filter(t=>ym(t.date)===m);
  const inc=rows.filter(t=>t.amt>0).reduce((a,t)=>a+t.amt,0);
  const exp=rows.filter(t=>t.amt<0).reduce((a,t)=>a+t.amt,0);
  return{inc,exp,net:inc+exp};
}
function calcYear(y){
  const rows=TX.filter(t=>t.date.startsWith(y+''));
  const inc=rows.filter(t=>t.amt>0).reduce((a,t)=>a+t.amt,0);
  const exp=rows.filter(t=>t.amt<0).reduce((a,t)=>a+t.amt,0);
  return{inc,exp,net:inc+exp};
}
function curYM(){return new Date().toISOString().slice(0,7);}
function curYear(){return new Date().getFullYear();}

function cpCalcM(m){
  const rows=m==='all'?COUPANG:COUPANG.filter(x=>ym(x.date)===m);
  const total=rows.reduce((a,x)=>a+x.amt,0);
  const qty=rows.reduce((a,x)=>a+(x.qty||0),0);
  return{total,qty,days:rows.length};
}

function renderSearch(c){
  const q=searchQuery.toLowerCase();
  const txR=TX.filter(t=>[t.item,t.note,t.cat].some(s=>(s||'').toLowerCase().includes(q)));
  const matR=MATS.filter(m=>[m.name,m.brand,m.colorName,m.type].some(s=>(s||'').toLowerCase().includes(q)));
  const prodR=PRODUCTS.filter(p=>[p.name,p.desc,p.note].some(s=>(s||'').toLowerCase().includes(q)));
  if(!txR.length&&!matR.length&&!prodR.length){c.innerHTML=`<div class="srch-none">검색 결과가 없습니다</div>`;return;}
  let html='';
  if(txR.length){
    html+=`<div class="srch-lbl">입출금 (${txR.length})</div>`;
    txR.sort((a,b)=>b.date.localeCompare(a.date)).forEach(t=>{
      html+=`<div class="tx-row" onclick="goTxFromSearch(${t.id})">
        <div class="tx-left">
          <div class="tx-meta"><span class="tx-date">${t.date.replace(/-/g,'.')}</span><span class="txb">${t.cat}</span></div>
          <div class="tx-name">${t.item||t.cat}${t.note?' · '+t.note:''}</div>
        </div>
        <div class="tx-amt ${t.amt>=0?'ain':'aex'}">${WA(t.amt)}</div>
      </div>`;
    });
  }
  if(matR.length){
    html+=`<div class="srch-lbl">재료 (${matR.length})</div>`;
    matR.forEach(m=>{html+=matRowHTML(m);});
  }
  if(prodR.length){
    html+=`<div class="srch-lbl">제품 (${prodR.length})</div>`;
    prodR.forEach(p=>{html+=prodRowHTML(p);});
  }
  c.innerHTML=html;
}

    <div class="cp-dash-card" style="border-style:dashed;background:var(--wh)">
      <div class="cdc-title">🛒 ${monthLabel} 쿠팡 일별 판매 현황</div>
      <div style="font-size:12px;color:var(--g3);padding:4px 0">아직 기록된 판매가 없습니다.<br>하단 <b>쿠팡판매</b> 탭에서 매일 판매금액을 기록해보세요.</div>
    </div>
  `;
  c.innerHTML=`
    <div style="padding:10px 14px 4px;font-size:11px;font-weight:700;color:var(--g3);letter-spacing:.06em;text-transform:uppercase;background:var(--g1)">${monthLabel} 현황</div>
    <div class="dash-grid">
      <div class="dg-cell"><div class="dg-lbl">총 수익</div><div class="dg-val" style="color:var(--gin)">${W(mon.inc)}</div>${hasPrev?`<div style="font-size:10px;margin-top:3px;color:${diffCol(incDiff)}">${diffTxt(incDiff)}</div>`:''}</div>
      <div class="dg-cell"><div class="dg-lbl">총 지출</div><div class="dg-val" style="color:var(--gex)">${W(Math.abs(mon.exp))}</div>${hasPrev?`<div style="font-size:10px;margin-top:3px;color:${diffCol(-expDiff)}">${diffTxt(-expDiff)}</div>`:''}</div>
      <div class="dg-cell"><div class="dg-lbl">순이익</div><div class="dg-val" style="color:${mon.net>=0?'var(--gin)':'var(--gex)'}">${WA(mon.net)}</div></div>
      <div class="dg-cell"><div class="dg-lbl">전월 대비 순이익</div><div class="dg-val" style="color:${hasPrev?diffCol(netDiff):'var(--g3)'};font-size:16px">${hasPrev?diffTxt(netDiff):'-'}</div></div>
    </div>
    ${cpCard}
    <div class="chart-sec">
      <div class="sec-title">월별 수익 현황</div>
      <div class="chart-wrap"><canvas id="dc"></canvas></div>
    </div>
    <div class="rec-sec">
      <div class="sec-title">최근 내역</div>
      <div id="rec-list"></div>
    </div>
  `;
  const labels=ms.map(ymL);
  const incs=ms.map(m=>calcM(m).inc);
  const exps=ms.map(m=>Math.abs(calcM(m).exp));
  const nets=ms.map(m=>calcM(m).net);
  if(chart)chart.destroy();
  chart=new Chart(document.getElementById('dc').getContext('2d'),{
    data:{labels,datasets:[
      {type:'bar', label:'수익', data:incs, backgroundColor:'rgba(42,122,74,.65)',yAxisID:'y'},
      {type:'bar', label:'지출', data:exps, backgroundColor:'rgba(181,48,48,.55)',yAxisID:'y'},
      {type:'line',label:'순이익',data:nets,borderColor:'#111',backgroundColor:'rgba(0,0,0,.06)',tension:.3,fill:true,yAxisID:'y',pointRadius:3,borderWidth:1.5},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{font:{size:10},boxWidth:10}}},
      scales:{y:{ticks:{callback:v=>v.toLocaleString(),font:{size:10}},grid:{color:'#eee'}},
               x:{ticks:{font:{size:10}},grid:{display:false}}}
    }
  });

  const recent=[...TX].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,8);
  document.getElementById('rec-list').innerHTML=recent.map(t=>`
    <div class="rec-row">
      <span class="rec-date">${t.date.replace(/-/g,'.')}</span>
      <span class="txb">${t.cat}</span>
      <span class="rec-name">${t.item||'-'}${t.note?' · '+t.note:''}</span>
      <span class="rec-amt" style="color:${t.amt>=0?'var(--gin)':'var(--gex)'}">${WA(t.amt)}</span>
    </div>
  `).join('')||'<div class="empty">내역 없음</div>';
}

// ── TRANSACTIONS ───────────────────────────
function renderTx(c){
  const ms=getMonths();
  const filtered=(txFilter==='all'?[...TX]:TX.filter(t=>ym(t.date)===txFilter))
    .sort((a,b)=>b.date.localeCompare(a.date));
  const grouped={};
  filtered.forEach(t=>{const k=ym(t.date);if(!grouped[k])grouped[k]=[];grouped[k].push(t);});
  let html='';
  Object.keys(grouped).sort().reverse().forEach(month=>{
    const{inc,exp,net}=calcM(month);
    const idx=ms.indexOf(month); const cum=ms.slice(0,idx+1).reduce((a,m)=>a+calcM(m).net,0);
    html+=`<div class="sec-lbl">${ymL(month)}</div>`;
    grouped[month].forEach(t=>{
      const isActive=activeRowId===t.id;
      html+=`
        <div class="tx-row${isActive?' active-row':''}" id="txr-${t.id}" onclick="toggleTxRow(${t.id})">
          <div class="tx-left">
            <div class="tx-meta">
              <span class="tx-date">${t.date.replace(/-/g,'.')}</span>
              <span class="txb">${t.cat}</span>
            </div>
            <div class="tx-name">${t.item||t.cat}${t.up?` · 단가 ${t.up.toLocaleString()}`:''
            }${t.qty?` × ${t.qty}`:''}</div>
            ${t.cat==='쿠팡정산'&&t.gross?`<div class="tx-note">매출 ${W(t.gross)}${t.fee?' · 수수료 -'+W(t.fee):''}${t.storage?' · 보관료 -'+W(t.storage):''}${t.adv?' · 광고비 -'+W(t.adv):''}</div>`:''}
            ${t.note?`<div class="tx-note">${t.note}</div>`:''}
          </div>
          <div class="tx-amt ${t.amt>=0?'ain':'aex'}">${WA(t.amt)}</div>
        </div>
        <div class="row-acts${isActive?' open':''}" id="txra-${t.id}">
          <button class="ra" onclick="openTxSheet(${t.id})">수정</button>
          <button class="ra del" onclick="delTx(${t.id})">삭제</button>
        </div>
      `;
    });
    html+=`<div class="m-sum">
      <div class="ms-title">${ymL(month)} 요약</div>
      <div class="ms-row"><span>수익</span><span class="ain">${W(inc)}</span></div>
      <div class="ms-row"><span>지출</span><span class="aex">-${W(Math.abs(exp))}</span></div>
      <div class="ms-row"><span>월 순이익</span><span class="${net>=0?'ain':'aex'}">${WA(net)}</span></div>
      <div class="ms-row cum"><span>누적 순이익</span><span class="${cum>=0?'ain':'aex'}">${WA(cum)}</span></div>
    </div>`;
  });
  c.innerHTML=html||'<div class="empty">입출금 내역이 없습니다<br>오른쪽 상단 + 버튼으로 추가하세요</div>';
}
function toggleTxRow(id){
  activeRowId=activeRowId===id?null:id; renderContent();
}

// ── MATERIALS ──────────────────────────────
function renderMats(c){
  const typeOrder=['실','포장재','박스','스티커','집기','기타'];
  const filtered=matFilter==='전체'?MATS:MATS.filter(m=>m.type===matFilter);
  let html='';
  if(matFilter==='전체'){
    typeOrder.forEach(type=>{
      const items=filtered.filter(m=>m.type===type);
      if(!items.length)return;
      html+=`<div class="sec-lbl">${MAT_IC[type]||''} ${type}</div>`;
      items.forEach(m=>{html+=matRowHTML(m);});
    });
  } else {
    filtered.forEach(m=>{html+=matRowHTML(m);});
  }
  c.innerHTML=html||'<div class="empty">재료가 없습니다</div>';
}
function matRowHTML(m){
  const isActive=activeRowId===m.id;
  const ico=m.type==='실'
    ?`<div class="mat-swatch" style="background:${m.color}"></div>`
    :`<div class="mat-icon">${MAT_IC[m.type]||'📋'}</div>`;
  const sub=[m.brand,m.num?`No.${m.num}`:'',m.spec].filter(Boolean).join(' · ');
  return `
    <div class="mat-row${isActive?' active-row':''}" onclick="toggleMatRow(${m.id})">
      ${ico}
      <div class="mat-info"><div class="mat-name">${m.name}</div>${sub?`<div class="mat-sub">${sub}</div>`:''}</div>
      <span class="mat-chev">›</span>
    </div>
    <div class="row-acts${isActive?' open':''}" id="mra-${m.id}">
      <button class="ra" onclick="openMatSheet(${m.id})">수정</button>
      <button class="ra del" onclick="delMat(${m.id})">삭제</button>
    </div>`;
}
function toggleMatRow(id){activeRowId=activeRowId===id?null:id;renderContent();}

// ── PRODUCTS ───────────────────────────────
function renderProds(c){
  const filtered=prodFilter==='전체'?PRODUCTS:PRODUCTS.filter(p=>p.status===prodFilter);
  c.innerHTML=filtered.map(p=>prodRowHTML(p)).join('')||'<div class="empty">등록된 제품이 없습니다</div>';
}
function prodRowHTML(p){
  const yarns=p.yarnIds.map(id=>MATS.find(m=>m.id===id&&m.type==='실')).filter(Boolean);
  const mats=p.matIds.map(id=>MATS.find(m=>m.id===id&&m.type!=='실')).filter(Boolean);
  const sc=p.status==='판매중'?'sa':p.status==='준비중'?'sp':'sd';
  const isActive=activeRowId===p.id;
  const cnt=p.salesCount||0;
  const hasPhoto=!!(p.photo);
  return `
    <div class="prod-row${isActive?' active-row':''}" onclick="toggleProdRow(${p.id})">
      ${isActive&&hasPhoto?`<img class="pr-photo" src="${p.photo}" alt="${p.name}" onclick="event.stopPropagation()">`:''
      }
      <div class="pr-hd">
        ${hasPhoto&&!isActive?`<img class="pr-thumb" src="${p.photo}" alt="${p.name}">`:''
        }
        <span class="pr-name">${p.name}</span>
        <span class="pr-st ${sc}">${p.status}</span>
        ${p.date?`<span class="pr-date">${p.date.replace(/-/g,'.')}</span>`:''}
      </div>
      ${p.desc?`<div class="pr-desc">${p.desc}</div>`:''}
      <div class="pr-tags">
        ${yarns.map(y=>`<span class="pr-tag"><span class="pr-dot" style="background:${y.color}"></span>${y.brand} No.${y.num} ${y.colorName}</span>`).join('')}
        ${mats.map(m=>`<span class="pr-tag">${MAT_IC[m.type]||''} ${m.name}${m.spec?' ('+m.spec+')':''}</span>`).join('')}
      </div>
      <div class="pr-sales"><span class="pr-sales-lbl">판매수량</span><span class="pr-sales-num">${cnt}개</span></div>
    </div>
    <div class="row-acts${isActive?' open':''}" id="pra-${p.id}">
      <div class="ra-cnt">
        <button class="cnt-btn" onclick="changeSales(${p.id},-1)" ${cnt<=0?'disabled style="opacity:.35"':''}>−</button>
        <span class="cnt-num">${cnt}</span>
        <button class="cnt-btn" onclick="changeSales(${p.id},+1)">＋</button>
      </div>
      <button class="ra" onclick="openProdSheet(${p.id})">수정</button>
      <button class="ra del" onclick="delProd(${p.id})">삭제</button>
    </div>`;
}
function toggleProdRow(id){activeRowId=activeRowId===id?null:id;renderContent();}
function changeSales(id,delta){
  const p=PRODUCTS.find(x=>x.id===id); if(!p)return;
  p.salesCount=Math.max(0,(p.salesCount||0)+delta);
  save(); renderContent();
}

// CSV EXPORT

function exportCSV(){
  const rows=[['날짜','구분','항목','단가','수량','금액','비고']];
  [...TX].sort((a,b)=>a.date.localeCompare(b.date)).forEach(t=>{
    rows.push([t.date,t.cat,t.item||'',t.up||'',t.qty||'',t.amt,t.note||'']);
  });
  const bom='\uFEFF';
  const csv=bom+rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download=`수세미판매관리_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(a.href);
  toast('CSV 내보내기 완료');
}

}

// ── TX SHEET ───────────────────────────────
function openTxSheet(idOrObj){
  const tx=typeof idOrObj==='number'?TX.find(t=>t.id===idOrObj):idOrObj;
  const cats=['입금','쿠팡정산','재료비','택배비','기타비용'];
  const isCoupang=tx?.cat==='쿠팡정산';
  openSheet(tx?'거래 수정':'거래 추가',`
    <form onsubmit="saveTx(event)">
      <input type="hidden" id="f-id" value="${tx?tx.id:''}">
      <div class="fg"><label class="fl">날짜</label>
        <input type="date" class="fi" id="f-date" value="${tx?tx.date:new Date().toISOString().split('T')[0]}" required></div>
      <div class="frow">
        <div class="fg"><label class="fl">구분</label>
          <select class="fi" id="f-cat" onchange="onCatChange()">
            ${cats.map(c=>`<option${tx?.cat===c?' selected':''}>${c}</option>`).join('')}
          </select></div>
        <div class="fg"><label class="fl">항목명</label>
          <input class="fi" id="f-item" value="${tx?tx.item||'':''}" placeholder="쿠팡, 네이버 등"></div>
      </div>
      <div id="mat-picker-row" style="display:${tx?.cat==='재료비'?'block':'none'}">
        <div class="fg" style="margin-top:-6px">
          <label class="fl">재료 목록에서 선택</label>
          <select class="fi" id="mat-picker" onchange="onMatPick()" style="color:var(--g4)">
            <option value="">— 선택하면 항목명·단가 자동입력 —</option>
            ${(()=>{
              const order=['실','포장재','박스','스티커','집기','기타'];
              return order.map(type=>{
                const items=MATS.filter(m=>m.type===type);
                if(!items.length)return'';
                const opts=items.map(m=>{
                  const label=[m.name,m.brand,m.num?`No.${m.num}`:'',m.spec].filter(Boolean).join(' · ');
                  const recentTx=[...TX].filter(t=>t.cat==='재료비'&&t.item===m.name).sort((a,b)=>b.date.localeCompare(a.date))[0];
                  return `<option value="${m.id}" data-name="${m.name}" data-up="${recentTx?.up||''}">${MAT_IC[type]||''} ${label}</option>`;
                }).join('');
                return `<optgroup label="${MAT_IC[type]||''} ${type}">${opts}</optgroup>`;
              }).join('');
            })()}
          </select>
        </div>
      </div>
      <div id="coupang-fields" style="display:${isCoupang?'block':'none'}">
        <div style="font-size:11px;color:var(--g3);margin-bottom:8px">▸ 수수료·보관료·광고비를 입력하면 실입금이 자동 계산됩니다</div>
        <div class="frow">
          <div class="fg"><label class="fl">총 매출액</label>
            <input type="number" class="fi" id="f-gross" value="${tx?.gross||''}" placeholder="0" oninput="calcCoupangNet()"></div>
          <div class="fg"><label class="fl">수수료</label>
            <input type="number" class="fi" id="f-fee" value="${tx?.fee||''}" placeholder="0" oninput="calcCoupangNet()"></div>
        </div>
        <div class="frow">
          <div class="fg"><label class="fl">보관료</label>
            <input type="number" class="fi" id="f-storage" value="${tx?.storage||''}" placeholder="0" oninput="calcCoupangNet()"></div>
          <div class="fg"><label class="fl">광고비</label>
            <input type="number" class="fi" id="f-adv" value="${tx?.adv||''}" placeholder="0" oninput="calcCoupangNet()"></div>
        </div>
        <div class="cs-calc" id="cs-calc-box">
          <div class="cs-row"><span>총 매출액</span><span id="cs-gross">-</span></div>
          <div class="cs-row"><span>수수료</span><span id="cs-fee" style="color:var(--gex)">-</span></div>
          <div class="cs-row"><span>보관료</span><span id="cs-storage" style="color:var(--gex)">-</span></div>
          <div class="cs-row"><span>광고비</span><span id="cs-adv" style="color:var(--gex)">-</span></div>
          <div class="cs-row total"><span>실 입금액</span><span id="cs-net" style="color:var(--gin)">-</span></div>
        </div>
      </div>
      <div class="frow" id="f-upqty-row">
        <div class="fg"><label class="fl">단가</label>
          <input type="number" class="fi" id="f-up" value="${tx?tx.up||'':''}" placeholder="0" oninput="calcTxAmt()"></div>
        <div class="fg"><label class="fl">수량</label>
          <input type="number" class="fi" id="f-qty" value="${tx?tx.qty||'':''}" placeholder="0" oninput="calcTxAmt()"></div>
      </div>
      <div class="fg"><label class="fl" id="f-amt-label">금액 (지출 자동 -)</label>
        <input type="number" class="fi" id="f-amt" value="${tx?tx.amt:''}" required placeholder="-27850" oninput="applyAmtSign()"></div>
      <div class="fg"><label class="fl">비고</label>
        <input class="fi" id="f-note" value="${tx?tx.note||'':''}" placeholder="메모"></div>
      <div class="div-line"></div>
      <button type="submit" class="fbtn fb-p">${tx?'저장하기':'추가하기'}</button>
      <button type="button" class="fbtn fb-s" onclick="closeSheet()">취소</button>
      ${tx?`<button type="button" class="fbtn fb-d" onclick="delTx(${tx.id})">삭제</button>`:''}
    </form>
  `);
  if(isCoupang)calcCoupangNet();
}
function calcTxAmt(){
  const up=parseFloat(document.getElementById('f-up')?.value)||0;
  const qty=parseFloat(document.getElementById('f-qty')?.value)||0;
  const cat=document.getElementById('f-cat')?.value||'';
  const isExpense=!['입금','쿠팡정산'].includes(cat);
  const amtEl=document.getElementById('f-amt');
  if(up&&qty){
    amtEl.value=(isExpense?-1:1)*up*qty;
  } else if(!amtEl.value&&isExpense){
    // 단가/수량 없이 금액 직접 입력할 때도 지출 카테고리면 -로 힌트
  }
}
function applyAmtSign(){
  const cat=document.getElementById('f-cat')?.value||'';
  const isExpense=!['입금','쿠팡정산'].includes(cat);
  const amtEl=document.getElementById('f-amt');
  const v=parseFloat(amtEl.value);
  if(!v)return;
  if(isExpense&&v>0)amtEl.value=-v;
  else if(!isExpense&&v<0)amtEl.value=-v;
}
function onCatChange(){
  const cat=document.getElementById('f-cat').value;
  const isCoupang=cat==='쿠팡정산';
  const isMat=cat==='재료비';
  document.getElementById('coupang-fields').style.display=isCoupang?'block':'none';
  document.getElementById('f-upqty-row').style.display=isCoupang?'none':'grid';
  document.getElementById('f-amt-label').textContent=isCoupang?'실 입금액 (자동계산)':'금액 (지출 자동 -)';
  document.getElementById('mat-picker-row').style.display=isMat?'block':'none';
  if(!isMat)document.getElementById('mat-picker').value='';
  if(isCoupang)calcCoupangNet();
  else applyAmtSign();
}
function onMatPick(){
  const sel=document.getElementById('mat-picker');
  const opt=sel.options[sel.selectedIndex];
  if(!opt||!opt.value)return;
  const name=opt.dataset.name||'';
  const up=opt.dataset.up||'';
  document.getElementById('f-item').value=name;
  if(up)document.getElementById('f-up').value=up;
  calcTxAmt();
  sel.value=''; // 선택 후 초기화해서 재선택 가능하게
}
function calcCoupangNet(){
  const g=parseFloat(document.getElementById('f-gross')?.value)||0;
  const f=parseFloat(document.getElementById('f-fee')?.value)||0;
  const s=parseFloat(document.getElementById('f-storage')?.value)||0;
  const a=parseFloat(document.getElementById('f-adv')?.value)||0;
  const net=g-f-s-a;
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  set('cs-gross',g?W(g):'-'); set('cs-fee',f?'-'+W(f):'-'); set('cs-storage',s?'-'+W(s):'-'); set('cs-adv',a?'-'+W(a):'-');
  set('cs-net',(g||f||s||a)?W(net):'-');
  if(g||f||s||a){const el=document.getElementById('f-amt');if(el)el.value=net;}
}
function saveTx(e){
  e.preventDefault();
  const id=parseInt(document.getElementById('f-id').value)||0;
  const cat=document.getElementById('f-cat').value;
  const isCoupang=cat==='쿠팡정산';
  const obj={
    id:id||nextTxId++,
    date:document.getElementById('f-date').value,
    cat,
    item:document.getElementById('f-item').value.trim(),

          <button class="ra del" onclick="delCp(${x.id})">삭제</button>
        </div>
      `;
    });
    html+=`<div class="cp-summary">
      <div class="cps-title">${ymL(month)} 요약</div>

    note:document.getElementById('fi-note').value.trim(),
  };
  if(id){const i=INBOUND.findIndex(x=>x.id===id);INBOUND[i]=obj;}else INBOUND.push(obj);
  save();closeSheet();activeRowId=null;renderContent();toast(id?'수정했습니다':'추가했습니다');
}
function delInb(id){if(!confirm('삭제하시겠습니까?'))return;INBOUND=INBOUND.filter(x=>x.id!==id);save();closeSheet();activeRowId=null;renderContent();toast('삭제했습니다');}

// ══════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200);}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
load(); renderStats(); renderFilter(); renderContent();
</script>
</body>
</html>
